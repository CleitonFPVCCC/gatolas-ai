<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gatolas AI</title>

<style>
body {
    background: radial-gradient(circle at center, #050a1f, #000000);
    color: #00ccff;
    font-family: Arial;
    text-align: center;
    margin: 0;
    overflow: hidden;
}

/* HEXAGON GRID */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(30deg, #00ccff10 12%, transparent 12.5%, transparent 87%, #00ccff10 87.5%, #00ccff10),
        linear-gradient(150deg, #00ccff10 12%, transparent 12.5%, transparent 87%, #00ccff10 87.5%, #00ccff10);
    background-size: 60px 100px;
    opacity: 0.2;
    z-index: 0;
}

/* Título */
h1 {
    margin-top: 20px;
    text-shadow: 0 0 20px #00ccff;
}

/* Imagem Gatolas */
#logo {
    margin-top: 20px;
    width: 280px;
    transform: rotate(90deg);
    filter: drop-shadow(0 0 20px #00ccff);
    animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
    0% { transform: rotate(90deg) scale(1); }
    50% { transform: rotate(90deg) scale(1.05); }
    100% { transform: rotate(90deg) scale(1); }
}

/* Chat */
#chat {
    width: 80%;
    margin: 20px auto;
    height: 300px;
    overflow-y: auto;
    border: 1px solid rgba(0, 204, 255, 0.4);
    padding: 10px;
    box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
    background: rgba(0,0,0,0.5);
}

/* Input */
input {
    width: 60%;
    padding: 10px;
    background: black;
    border: 1px solid #00ccff;
    color: #00ccff;
}

/* Botão */
button {
    padding: 10px;
    background: #00ccff;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 10px #00ccff;
}

/* Relâmpagos suaves */
.lightning {
    position: absolute;
    width: 2px;
    height: 100%;
    background: linear-gradient(transparent, #00ccff, transparent);
    opacity: 0.05;
    animation: flash 3s infinite ease-in-out;
}

@keyframes flash {
    0% {opacity: 0;}
    50% {opacity: 0.3;}
    100% {opacity: 0;}
}
</style>
</head>

<body>

<h1>⚡ GATOLAS AI ⚡</h1>

<img id="logo" src="Gatolas.png">

<div id="chat"></div>

<br>

<input id="pergunta" placeholder="Fala com Gatolas...">
<button onclick="enviar()">Enviar</button>

<script>
const chat = document.getElementById("chat")

function adicionar(texto) {
    chat.innerHTML += "<p>" + texto + "</p>"
    chat.scrollTop = chat.scrollHeight
}

async function enviar() {
    let texto = document.getElementById("pergunta").value

    adicionar("Você: " + texto)

    let resposta = await fetch("https://gatolas-ai.onrender.com/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({texto})
    })

    let data = await resposta.json()

    adicionar("Gatolas: " + data.resposta)
}

// relâmpagos suaves
for(let i=0; i<15; i++){
    let linha = document.createElement("div")
    linha.className = "lightning"
    linha.style.left = Math.random()*100 + "%"
    linha.style.animationDelay = Math.random()*5 + "s"
    document.body.appendChild(linha)
}
</script>

</body>
</html>

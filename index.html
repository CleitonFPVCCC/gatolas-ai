<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gatolas AI</title>

<style>
body {
    background: radial-gradient(circle at center, #050a1f, #000000);
    color: #00ccff;
    font-family: Arial;
    margin: 0;
    overflow: hidden;
}

/* HEXAGON GRID */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(30deg, #00ccff10 12%, transparent 12.5%, transparent 87%, #00ccff10 87.5%),
        linear-gradient(150deg, #00ccff10 12%, transparent 12.5%, transparent 87%, #00ccff10 87.5%);
    background-size: 60px 100px;
    opacity: 0.15;
    z-index: 0;
}

/* GARANTE QUE TUDO FICA POR CIMA */
* {
    position: relative;
    z-index: 1;
}

/* LAYOUT HUD */
.hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px;
}

/* PAINÉIS */
.panel {
    width: 20%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,204,255,0.3);
    padding: 15px;
    box-shadow: 0 0 15px rgba(0,204,255,0.2);
    border-radius: 10px;
}

/* CENTRO */
.center {
    width: 50%;
    text-align: center;
}

/* LOGO */
#logo {
    width: 350px;
    filter: drop-shadow(0 0 25px #00ccff);
    animation: pulse 3s infinite ease-in-out;
}

/* ANIMAÇÃO */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* CHAT */
#chat {
    width: 80%;
    margin: 10px auto;
    height: 220px;
    overflow-y: auto;
    border: 1px solid rgba(0,204,255,0.3);
    padding: 10px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
}

/* INPUT AREA */
.input-area {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    width: 50%;
    padding: 10px;
    background: black;
    border: 1px solid #00ccff;
    color: #00ccff;
    border-radius: 5px;
}

button {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #00ccff;
    color: #00ccff;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #00ccff;
    color: black;
}

/* RELÂMPAGOS SUAVES */
.lightning {
    position: absolute;
    width: 2px;
    height: 100%;
    background: linear-gradient(transparent, #00ccff, transparent);
    opacity: 0.05;
    animation: flash 4s infinite;
}

@keyframes flash {
    0% {opacity: 0;}
    50% {opacity: 0.3;}
    100% {opacity: 0;}
}
</style>
</head>

<body>

<div class="hud">

    <!-- ESQUERDA -->
    <div class="panel">
        <h2>GATOLAS AI</h2>
        <p>SISTEMA ONLINE ●</p>
        <p>STATUS: ATIVO</p>
        <p>MODELO: GPT-4o-mini</p>
        <p>CONEXÃO: ESTÁVEL</p>
    </div>

    <!-- CENTRO -->
    <div class="center">
        <img id="logo" src="Gatolas.png">
    </div>

    <!-- DIREITA -->
    <div class="panel">
        <h3>COMANDOS</h3>
        <p>/limpar</p>
        <p>/ajuda</p>
        <p>/memoria</p>
        <p>/status</p>
    </div>

</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="input-area">
    <input id="pergunta" placeholder="Fala com Gatolas...">
    <button onclick="enviar()">ENVIAR</button>
</div>

<script>
const chat = document.getElementById("chat")

function adicionar(texto) {
    chat.innerHTML += "<p>" + texto + "</p>"
    chat.scrollTop = chat.scrollHeight
}

async function enviar() {
    let input = document.getElementById("pergunta")
    let texto = input.value

    if(!texto) return

    adicionar("Você: " + texto)
    input.value = ""

    let resposta = await fetch("https://gatolas-ai.onrender.com/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({texto})
    })

    let data = await resposta.json()

    adicionar("Gatolas: " + data.resposta)
}

/* ENTER para enviar */
document.getElementById("pergunta").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        enviar()
    }
})

/* RELÂMPAGOS */
for(let i=0; i<10; i++){
    let linha = document.createElement("div")
    linha.className = "lightning"
    linha.style.left = Math.random()*100 + "%"
    linha.style.animationDelay = Math.random()*5 + "s"
    document.body.appendChild(linha)
}
</script>

</body>
</html>

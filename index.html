<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gatolas AI</title>

<style>
body {
    background: radial-gradient(circle, #050a1f, #000000);
    color: #00ccff;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 20px;
    text-shadow: 0 0 20px #00ccff;
}

#chat {
    width: 80%;
    margin: auto;
    height: 400px;
    overflow-y: auto;
    border: 1px solid #00ccff;
    padding: 10px;
    box-shadow: 0 0 20px #00ccff;
}

input {
    width: 60%;
    padding: 10px;
    background: black;
    border: 1px solid #00ccff;
    color: #00ccff;
}

button {
    padding: 10px;
    background: #00ccff;
    border: none;
    cursor: pointer;
}

.lightning {
    position: absolute;
    width: 2px;
    height: 100%;
    background: #00ccff;
    opacity: 0.2;
    animation: flash 0.2s infinite;
}

@keyframes flash {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}
</style>
</head>

<body>

<h1>⚡ GATOLAS AI ⚡</h1>

<div id="chat"></div>

<br>

<input id="pergunta" placeholder="Fala com Gatolas...">
<button onclick="enviar()">Enviar</button>

<script>
const chat = document.getElementById("chat")

function adicionar(texto) {
    chat.innerHTML += "<p>" + texto + "</p>"
    chat.scrollTop = chat.scrollHeight
}

async function enviar() {
    let texto = document.getElementById("pergunta").value

    adicionar("Você: " + texto)

    let resposta = await fetch("https://gatolas-ai.onrender.com/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({texto})
    })

    let data = await resposta.json()

    adicionar("Gatolas: " + data.resposta)
}

// criar relâmpagos
for(let i=0; i<30; i++){
    let linha = document.createElement("div")
    linha.className = "lightning"
    linha.style.left = Math.random()*100 + "%"
    linha.style.animationDelay = Math.random() + "s"
    document.body.appendChild(linha)
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gatolas AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Orbitron", sans-serif;
    background: radial-gradient(circle, #020617, #000);
    color: #00eaff;
    overflow: auto;
}

/* GRID HEX */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(30deg, #00eaff08 12%, transparent 12.5%),
        linear-gradient(150deg, #00eaff08 12%, transparent 12.5%);
    background-size: 60px 100px;
    opacity: 0.2;
    z-index: 0;
}

/* HUD LINES */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,234,255,0.03) 3px
    );
    pointer-events: none;
}

/* LAYOUT */
.container {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    position: relative;
    z-index: 1;
}

/* PAINEL */
.panel {
    width: 260px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,234,255,0.3);
    box-shadow: 0 0 20px rgba(0,234,255,0.2);
    transition: 0.3s;
}

.panel:hover {
    box-shadow: 0 0 40px #00eaff;
    transform: translateY(-5px);
}

/* TITULOS */
.panel h2, .panel h3 {
    margin-top: 0;
    border-bottom: 1px solid #00eaff30;
    padding-bottom: 5px;
}

/* STATUS */
.dot {
    height: 10px;
    width: 10px;
    background: #00ff88;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 10px #00ff88;
}

/* LOGO */
.logo img {
    width: 400px;
    mix-blend-mode: screen;
    filter: drop-shadow(0 0 40px #00eaff);
    animation: pulse 3s infinite;
}

/* ANIMAÇÃO */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1); }
}

/* CHAT */
#chat {
    width: 90%;
    margin: 20px auto;
    height: 300px;
    overflow-y: auto;
    border-radius: 10px;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,234,255,0.3);
    box-shadow: inset 0 0 20px #00eaff20;
    font-family: "Courier New", monospace;
}

/* CURSOR */
#chat p::after {
    content: " █";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* INPUT */
.input-area {
    display: flex;
    justify-content: center;
    gap: 10px;
    position: relative;
    z-index: 1;
}

input {
    width: 60%;
    padding: 12px;
    background: black;
    border: 1px solid #00eaff;
    color: #00eaff;
    border-radius: 8px;
    outline: none;
    box-shadow: 0 0 10px #00eaff30;
}

input:focus {
    box-shadow: 0 0 25px #00eaff;
}

/* BOTÃO */
button {
    padding: 12px 25px;
    background: transparent;
    border: 1px solid #00eaff;
    color: #00eaff;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

button:hover {
    background: #00eaff20;
    box-shadow: 0 0 20px #00eaff;
}

/* COMANDOS */
.panel p {
    cursor: pointer;
    transition: 0.3s;
}

.panel p:hover {
    color: #00ffcc;
    transform: translateX(5px);
}
</style>
</head>

<body>

<div class="container">

<div class="panel">
    <h2>GATOLAS AI</h2>
    <p><span class="dot"></span> Sistema Online</p>
    <p>Status: Ativo</p>
    <p>Modelo: GPT-4o-mini</p>
    <p>Conexão: Estável</p>
</div>

<div class="logo">
    <img src="Gatolas.png">
</div>

<div class="panel">
    <h3>Comandos</h3>
    <p onclick="limpar()">/limpar</p>
    <p onclick="ajuda()">/ajuda</p>
    <p onclick="memoria()">/memoria</p>
</div>

</div>

<div id="chat"></div>

<div class="input-area">
    <input id="pergunta" placeholder="Fala com Gatolas...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
const chat = document.getElementById("chat")
const input = document.getElementById("pergunta")

function adicionar(texto) {
    chat.innerHTML += `<p>> ${texto}</p>`
    chat.scrollTop = chat.scrollHeight
}

/* ENTER para enviar */
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        enviar()
    }
})

async function enviar() {
    let texto = input.value
    if(!texto) return

    adicionar("Você: " + texto)
    input.value = ""

    let resposta = await fetch("https://gatolas-ai.onrender.com/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({texto})
    })

    let data = await resposta.json()

    adicionar("Gatolas: " + data.resposta)
}

/* COMANDOS */
function limpar() {
    chat.innerHTML = ""
}

function ajuda() {
    adicionar("Gatolas: Comandos disponíveis: /limpar, /memoria")
}

function memoria() {
    adicionar("Gatolas: Memória ainda em desenvolvimento")
}
</script>

</body>
</html>

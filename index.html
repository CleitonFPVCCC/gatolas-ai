<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gatolas AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Orbitron", sans-serif;
    background: radial-gradient(circle, #020617, #000);
    color: #00eaff;
    overflow: hidden;
}

/* HEX REAL */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        repeating-linear-gradient(60deg, #00eaff0a 0 2px, transparent 2px 60px),
        repeating-linear-gradient(-60deg, #00eaff0a 0 2px, transparent 2px 60px);
}

/* LAYOUT */
.container {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

/* PAINEL */
.panel {
    width: 220px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.5);
    position: relative;
    font-size: 13px;
}

/* BORDA ANIMADA COMPLETA */
.panel::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 10px;
    padding: 1px;
    background: linear-gradient(90deg, transparent, #00eaff, transparent);
    background-size: 200% 100%;
    animation: borderRun 5s linear infinite;

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
}

@keyframes borderRun {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* TITULO */
.panel h2, .panel h3 {
    margin-top: 0;
    border-bottom: 1px solid #00eaff30;
}

/* STATUS */
.dot {
    width: 8px;
    height: 8px;
    background: #00ff88;
    border-radius: 50%;
    display: inline-block;
}

/* LOGO */
.logo img {
    width: 380px;
    mix-blend-mode: screen;
    filter: drop-shadow(0 0 40px #00eaff);
    animation: pulse 3s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.05); }
}

/* CHAT */
#chat {
    width: 90%;
    margin: 10px auto;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    background: rgba(0,0,0,0.7);
    font-family: "Share Tech Mono", monospace;
    border-radius: 10px;
}

/* CURSOR */
.cursor::after {
    content: " █";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* INPUT */
.input-area {
    display: flex;
    justify-content: center;
    gap: 10px;
}

input {
    width: 60%;
    padding: 10px;
    background: black;
    border: 1px solid #00eaff;
    color: #00eaff;
}

button {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #00eaff;
    color: #00eaff;
    cursor: pointer;
}

/* COMANDOS */
.panel p {
    cursor: pointer;
    transition: 0.2s;
}

.panel p:hover {
    color: #00ffcc;
}
</style>
</head>

<body>

<div class="container">

<div class="panel">
    <h2>GATOLAS AI</h2>
    <p onclick="infoSistema()"><span class="dot"></span> Sistema</p>
    <p onclick="infoStatus()">Status</p>
    <p onclick="infoModelo()">Modelo</p>
    <p onclick="infoConexao()">Conexão</p>
</div>

<div class="logo">
    <img src="Gatolas.png">
</div>

<div class="panel">
    <h3>COMANDOS</h3>
    <p onclick="limpar()">[ CLR ] Limpar</p>
    <p onclick="ajuda()">[ HLP ] Ajuda</p>
    <p onclick="memoria()">[ MEM ] Memória</p>
</div>

</div>

<div id="chat"></div>

<div class="input-area">
    <input id="pergunta" placeholder="Digite comando...">
    <button onclick="enviar()">EXEC</button>
</div>

<script>
const chat = document.getElementById("chat")
const input = document.getElementById("pergunta")

function adicionar(texto) {
    document.querySelectorAll(".cursor").forEach(el => el.classList.remove("cursor"))

    let linha = document.createElement("p")
    linha.classList.add("cursor")
    linha.textContent = "> " + texto

    chat.appendChild(linha)
    chat.scrollTop = chat.scrollHeight
}

input.addEventListener("keypress", e => {
    if (e.key === "Enter") enviar()
})

async function enviar() {
    let texto = input.value
    if(!texto) return

    adicionar("Você: " + texto)
    input.value = ""

    let resposta = await fetch("https://gatolas-ai.onrender.com/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({texto})
    })

    let data = await resposta.json()
    adicionar("Gatolas: " + data.resposta)
}

/* INFO */
function infoSistema(){ adicionar("Sistema online.") }
function infoStatus(){ adicionar("Serviços ativos.") }
function infoModelo(){ adicionar("GPT-4o-mini ativo.") }
function infoConexao(){ adicionar("Conexão estável.") }

function limpar(){ chat.innerHTML = "" }
function ajuda(){ adicionar("Use: CLR, MEM") }
function memoria(){ adicionar("Memória futura.") }

/* RELÂMPAGO SUAVE */
setInterval(() => {
    let l = document.createElement("div")
    l.style.position="absolute"
    l.style.left=Math.random()*100+"%"
    l.style.width="1px"
    l.style.height="100%"
    l.style.background="#00eaff"
    l.style.opacity="0.2"
    document.body.appendChild(l)
    setTimeout(()=>l.remove(),200)
},5000)

</script>

</body>
</html>
